<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Ortografía - Modo Evaluación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
:root { --navy: #1a237e; --blue: #3949ab; --accent: #ffd600; --green: #00c853; --red: #f44336; --white: #ffffff; --light: #e8eaf6; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #0d1257 0%, #1a237e 50%, #283593 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.screen { display: none; width: 100%; max-width: 700px; }
.screen.active { display: block; }
.card { background: var(--white); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden; margin-top: 20px; }
.card-header { background: linear-gradient(135deg, #1a237e, #3949ab); padding: 20px; color: white; text-align: center; }
.card-body { padding: 25px; }
.btn { padding: 12px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; font-family: inherit; }
.btn-accent { background: var(--accent); color: var(--navy); }
.btn-small { width: auto; padding: 5px 10px; font-size: 0.8rem; margin: 0; }
.text-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; }
.student-item { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #dee2e6; }
.correct { color: var(--green); font-weight: bold; }
.wrong { color: var(--red); font-weight: bold; text-decoration: line-through; }
.blank-inp { width: 30px; border: none; border-bottom: 2px solid var(--navy); text-align: center; font-weight: bold; outline: none; }
#roleSelector { text-align: center; color: white; margin-top: 50px; }
.role-btn { background: rgba(255,255,255,0.1); border: 2px solid white; color: white; padding: 20px; border-radius: 15px; cursor: pointer; margin: 10px; display: inline-block; width: 140px; }
</style>
</head>
<body>

<div id="roleSelector">
    <h1 style="font-family:'Fredoka One'">Taller en Vivo</h1>
    <div class="role-btn" onclick="selectRole('student')">🎒 Alumno</div>
    <div class="role-btn" onclick="selectRole('teacher')">👩‍🏫 Profesor</div>
</div>

<div class="screen" id="scrJoin">
    <div class="card">
        <div class="card-header"><h2>Registro</h2></div>
        <div class="card-body">
            <input type="text" id="nameInp" class="text-input" placeholder="Tu nombre">
            <button class="btn btn-accent" onclick="join()">Entrar</button>
        </div>
    </div>
</div>

<div class="screen" id="scrWait">
    <div class="card">
        <div class="card-header"><h2>Sala de Espera</h2></div>
        <div class="card-body" style="text-align:center">
            <p>Hola <strong id="stName"></strong>, espera a que el profesor inicie.</p>
        </div>
    </div>
</div>

<div class="screen" id="scrWork">
    <div class="card">
        <div class="card-header"><h2>Completa el texto</h2></div>
        <div class="card-body">
            <p style="line-height: 2;">
                El jo<input class="blank-inp" id="q0" maxlength="1">en o<input class="blank-inp" id="q1" maxlength="1">ser<input class="blank-inp" id="q2" maxlength="1">aba el paisa<input class="blank-inp" id="q3" maxlength="1">e con mucha <input class="blank-inp" id="q4" maxlength="1">ida.
            </p>
            <button class="btn btn-accent" onclick="finish()">Enviar Respuestas</button>
        </div>
    </div>
</div>

<div class="screen" id="scrTeacher">
    <div class="card">
        <div class="card-header"><h2>Panel del Profesor</h2></div>
        <div class="card-body">
            <div id="profControls">
                <button class="btn btn-accent" id="startBtn" onclick="start()">🚀 Iniciar Taller para Todos</button>
                <button class="btn" onclick="location.reload()" style="background:#ddd">🔄 Refrescar Lista</button>
            </div>
            <h3 style="margin-top:20px">Alumnos y Resultados:</h3>
            <div id="profList" style="margin-top:10px"></div>
            <button class="btn" style="background:var(--red); color:white; margin-top:20px" onclick="localStorage.clear();location.reload();">Limpiar Todo</button>
        </div>
    </div>
</div>

<script>
const KEY = 'taller_v10';
const ANSWERS = ['v', 'b', 'v', 'j', 'v']; // joven, observaba, paisaje, vida
let role = '';
let myName = '';

function getRoom() { return JSON.parse(localStorage.getItem(KEY)) || { status: 'lobby', students: {} }; }
function saveRoom(room) { localStorage.setItem(KEY, JSON.stringify(room)); window.dispatchEvent(new Event('storage')); }

function selectRole(r) {
    role = r;
    document.getElementById('roleSelector').style.display = 'none';
    if(r === 'student') show('scrJoin');
    else { show('scrTeacher'); setInterval(updateTeacherUI, 1000); }
}

function join() {
    myName = document.getElementById('nameInp').value.trim();
    if(!myName) return;
    let room = getRoom();
    room.students[myName] = { status: 'waiting', score: 0, answers: [] };
    saveRoom(room);
    document.getElementById('stName').textContent = myName;
    show('scrWait');
    setInterval(checkStatus, 1000);
}

function checkStatus() {
    let room = getRoom();
    if(room.status === 'active' && room.students[myName].status === 'waiting') show('scrWork');
}

function finish() {
    let userAns = [];
    let score = 0;
    for(let i=0; i<ANSWERS.length; i++) {
        let val = document.getElementById('q'+i).value.toLowerCase();
        userAns.push(val);
        if(val === ANSWERS[i]) score += 20;
    }
    let room = getRoom();
    room.students[myName] = { status: 'finished', score: score, answers: userAns };
    saveRoom(room);
    alert("Tus respuestas han sido enviadas. Puntaje: " + score);
    location.reload();
}

function start() {
    let room = getRoom();
    room.status = 'active';
    saveRoom(room);
}

function updateTeacherUI() {
    let room = getRoom();
    const list = document.getElementById('profList');
    list.innerHTML = '';
    
    for(let name in room.students) {
        let s = room.students[name];
        let item = document.createElement('div');
        item.className = 'student-item';
        
        let info = `<strong>${name}</strong> - ${s.status === 'finished' ? 'Puntaje: ' + s.score : 'En espera/Trabajando'}`;
        
        let detailBtn = '';
        if(s.status === 'finished') {
            detailBtn = `<button class="btn btn-small btn-accent" onclick="showDetail('${name}')">Ver Errores</button>`;
        }
        
        item.innerHTML = `<span>${info}</span> ${detailBtn}`;
        list.appendChild(item);
    }
}

function showDetail(name) {
    let room = getRoom();
    let s = room.students[name];
    let msg = `Detalle de ${name}:\n\n`;
    
    // Mostramos corrección comparativa
    s.answers.forEach((ans, i) => {
        let correct = ANSWERS[i];
        msg += `Espacio ${i+1}: Tuvo "${ans}". Correcto: "${correct}" -> ${ans === correct ? '✅' : '❌'}\n`;
    });
    
    alert(msg);
}

function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
