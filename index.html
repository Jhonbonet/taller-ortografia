<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Ortografía</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
:root { --navy: #1a237e; --blue: #3949ab; --accent: #ffd600; --green: #00c853; --red: #f44336; --white: #ffffff; --light: #e8eaf6; --shadow: 0 8px 32px rgba(26,35,126,0.18); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #0d1257 0%, #1a237e 50%, #283593 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.screen { display: none; width: 100%; max-width: 600px; }
.screen.active { display: block; }
.card { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; margin-top: 20px; }
.card-header { background: linear-gradient(135deg, #1a237e, #3949ab); padding: 20px; color: white; text-align: center; }
.card-body { padding: 25px; }
.btn { padding: 12px 20px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; font-family: inherit; }
.btn-accent { background: var(--accent); color: var(--navy); }
.btn-red { background: var(--red); color: white; }
.text-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 1rem; }
.student-list { margin: 15px 0; background: #f5f5f5; border-radius: 10px; padding: 10px; }
.student-item { padding: 8px; border-bottom: 1px solid #eee; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
.timer { font-family: 'Fredoka One'; font-size: 2rem; text-align: center; color: var(--navy); margin: 20px 0; }
#roleSelector { text-align: center; color: white; margin-top: 50px; }
.role-btn { background: rgba(255,255,255,0.1); border: 2px solid white; color: white; padding: 20px; border-radius: 15px; cursor: pointer; margin: 10px; display: inline-block; width: 150px; }
</style>
</head>
<body>

<div id="roleSelector">
    <h1 style="font-family:'Fredoka One'">Taller de Ortografía</h1>
    <div class="role-btn" onclick="selectRole('student')">🎒<br>Alumno</div>
    <div class="role-btn" onclick="selectRole('teacher')">👩‍🏫<br>Profesor</div>
</div>

<div class="screen" id="scrJoin">
    <div class="card">
        <div class="card-header"><h2>Registro de Alumno</h2></div>
        <div class="card-body">
            <input type="text" id="nameInp" class="text-input" placeholder="Tu nombre">
            <button class="btn btn-accent" onclick="join()">Unirse</button>
        </div>
    </div>
</div>

<div class="screen" id="scrWait">
    <div class="card">
        <div class="card-header"><h2>Sala de Espera</h2></div>
        <div class="card-body" style="text-align:center">
            <p>Hola <strong id="stName"></strong>. Espera al profesor...</p>
            <div style="margin:20px; font-size:3rem">⏳</div>
        </div>
    </div>
</div>

<div class="screen" id="scrLobby">
    <div class="card">
        <div class="card-header"><h2>Panel del Profesor</h2></div>
        <div class="card-body">
            <p>Alumnos conectados:</p>
            <div id="list" class="student-list"></div>
            <button class="btn btn-accent" id="startBtn" onclick="startTaller()">🚀 Iniciar Taller</button>
            <button class="btn btn-red" onclick="reset()">Limpiar Sala</button>
        </div>
    </div>
</div>

<div class="screen" id="scrWork">
    <div class="card">
        <div class="card-header"><h2>Taller en Curso</h2></div>
        <div class="card-body">
            <div class="timer" id="timer">05:00</div>
            <p style="text-align:center">Responde los ejercicios en tu hoja.</p>
        </div>
    </div>
</div>

<script>
const KEY = 'taller_orto_v1';
let role = '';
let myName = '';

function getRoom() { 
    return JSON.parse(localStorage.getItem(KEY)) || { status: 'lobby', students: [] }; 
}

function saveRoom(room) { 
    localStorage.setItem(KEY, JSON.stringify(room)); 
    window.dispatchEvent(new Event('storage')); 
}

function selectRole(r) {
    role = r;
    document.getElementById('roleSelector').style.display = 'none';
    if(r === 'student') show('scrJoin');
    else {
        show('scrLobby');
        setInterval(refreshLobby, 1000);
    }
}

function join() {
    const n = document.getElementById('nameInp').value.trim();
    if(!n) return;
    myName = n;
    let room = getRoom();
    if(!room.students.includes(n)) room.students.push(n);
    saveRoom(room);
    document.getElementById('stName').textContent = n;
    show('scrWait');
    setInterval(checkStatus, 1000);
}

function refreshLobby() {
    let room = getRoom();
    const list = document.getElementById('list');
    list.innerHTML = room.students.map(s => `<div class="student-item"><div class="dot"></div>${s}</div>`).join('');
    document.getElementById('startBtn').disabled = room.students.length === 0;
}

function startTaller() {
    let room = getRoom();
    if(room.students.length === 0) return alert("No hay alumnos");
    room.status = 'active';
    saveRoom(room);
    show('scrWork');
    runTimer();
}

function checkStatus() {
    let room = getRoom();
    if(room.status === 'active') {
        show('scrWork');
        runTimer();
    }
}

function runTimer() {
    let time = 300;
    const display = document.getElementById('timer');
    const int = setInterval(() => {
        let m = Math.floor(time / 60), s = time % 60;
        display.textContent = `${m}:${s < 10 ? '0'+s : s}`;
        if(--time < 0) clearInterval(int);
    }, 1000);
}

function reset() {
    localStorage.removeItem(KEY);
    location.reload();
}

function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
