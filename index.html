<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Ortografía - En Vivo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --navy: #1a237e; --blue: #3949ab; --accent: #ffd600; --green: #00c853;
  --red: #f44336; --white: #ffffff; --light: #e8eaf6;
  --shadow: 0 8px 32px rgba(26,35,126,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #0d1257 0%, #1a237e 50%, #283593 100%);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 12px;
}

/* UI Components */
.screen { display: none; width: 100%; max-width: 800px; }
.screen.active { display: block; }
.card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: var(--shadow); }
.card-header { background: linear-gradient(135deg, #1a237e, #3949ab); padding: 25px; color: white; }
.card-body { padding: 30px; }

/* Role Selector */
#roleSelector { text-align: center; color: white; margin-top: 50px; }
.role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; width: 100%; max-width: 500px; }
.role-card { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.3s; }
.role-card:hover { background: rgba(255,255,255,0.2); border-color: var(--accent); transform: translateY(-5px); }

/* Buttons & Inputs */
.btn { padding: 15px 25px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-family: inherit; transition: 0.2s; width: 100%; }
.btn-accent { background: var(--accent); color: var(--navy); }
.btn-red { background: var(--red); color: white; }
.text-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; margin-bottom: 20px; outline: none; }

/* Grid Alumnos */
.teacher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 20px 0; }
.student-card { background: var(--light); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--navy); }
.dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; }

.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="roleSelector">
    <h1>Taller de Ortografía</h1>
    <p>Elige tu perfil para comenzar</p>
    <div class="role-cards">
        <div class="role-card" onclick="selectRole('student')">🎒<br>Alumno</div>
        <div class="role-card" onclick="selectRole('teacher')">👩‍🏫<br>Profesor</div>
    </div>
</div>

<div class="screen" id="scrStudentJoin">
    <div class="card">
        <div class="card-header"><h2>Registro de Alumno</h2></div>
        <div class="card-body">
            <input type="text" id="studentNameInput" class="text-input" placeholder="Tu nombre completo">
            <button class="btn btn-accent" onclick="joinRoom()">Entrar a la Sala</button>
            <p id="joinError" style="color:red; margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>
</div>

<div class="screen" id="scrStudentWaiting">
    <div class="card">
        <div class="card-header"><h2>Sala de Espera</h2></div>
        <div class="card-body" style="text-align:center">
            <p>Hola <b id="waitName"></b>, ya estás en la lista.</p>
            <div class="spinner"></div>
            <p>Esperando que el profesor inicie el taller...</p>
        </div>
    </div>
</div>

<div class="screen" id="scrTeacherLobby">
    <div class="card">
        <div class="card-header"><h2>Panel del Profesor</h2></div>
        <div class="card-body">
            <p>Alumnos conectados actualmente:</p>
            <div id="teacherStudentGrid" class="teacher-grid"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-red" onclick="resetRoom()">Limpiar Sala</button>
                <button class="btn btn-accent" id="startBtn" onclick="startTaller()" disabled>Iniciar Taller</button>
            </div>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY = 'taller_ortografia_v6';
let myName = '';
let myRole = '';

// --- MOTOR DE SINCRONIZACIÓN (LA CLAVE) ---
function getRoom() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : { phase: 'lobby', students: [] };
}

function saveRoom(room) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(room));
    // Disparamos un evento manual para que la misma pestaña reaccione
    window.dispatchEvent(new Event('storage'));
}

function selectRole(role) {
    myRole = role;
    document.getElementById('roleSelector').style.display = 'none';
    
    if (role === 'student') {
        showScreen('scrStudentJoin');
    } else {
        showScreen('scrTeacherLobby');
        // El profesor empieza a escuchar inmediatamente
        setInterval(refreshTeacherUI, 500); 
    }
}

// --- LÓGICA DEL ALUMNO ---
function joinRoom() {
    const input = document.getElementById('studentNameInput');
    const name = input.value.trim();
    if (!name) return;

    let room = getRoom();
    if (room.students.includes(name)) {
        document.getElementById('joinError').innerText = "Este nombre ya existe.";
        return;
    }

    myName = name;
    room.students.push(name);
    saveRoom(room);

    document.getElementById('waitName').innerText = name;
    showScreen('scrStudentWaiting');
}

// --- LÓGICA DEL PROFESOR ---
function refreshTeacherUI() {
    if (myRole !== 'teacher') return;
    
    const room = getRoom();
    const grid = document.getElementById('teacherStudentGrid');
    const startBtn = document.getElementById('startBtn');

    if (room.students.length === 0) {
        grid.innerHTML = "<p style='color:gray'>Esperando que entren alumnos...</p>";
        startBtn.disabled = true;
    } else {
        grid.innerHTML = room.students.map(name => `
            <div class="student-card">
                <div class="dot"></div>
                ${name}
            </div>
        `).join('');
        startBtn.disabled = false;
    }
}

function resetRoom() {
    if (confirm("¿Seguro que quieres borrar a todos los alumnos?")) {
        saveRoom({ phase: 'lobby', students: [] });
        location.reload();
    }
}

function startTaller() {
    alert("¡Taller iniciado! (Aquí iría la lógica de las preguntas)");
}

// --- UTILIDADES ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Escuchar cambios de otras pestañas
window.addEventListener('storage', () => {
    if (myRole === 'teacher') refreshTeacherUI();
});

</script>
</body>
</html>
